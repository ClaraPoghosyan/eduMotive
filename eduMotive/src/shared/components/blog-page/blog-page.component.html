<app-header></app-header>

@if (blog) {
  <div class="blog-detail">
    <div class="blog-hero" [style.background-image]="'url(/assets/' + blog.imageUrl + ')'">
      <div class="overlay">
        <button class="back-btn" (click)="goBack()">← Վերադառնալ</button>
        <h1 class="blog-title">{{ blog.title }}</h1>
        <p class="blog-meta">{{ blog.createdAt | date: 'dd MMMM yyyy' }}</p>
      </div>
    </div>

    <div class="blog-body">
      <p class="blog-short-desc" [innerHTML]="blog.shortDescription"></p>
      <div class="blog-divider"></div>
      <div class="blog-content" [innerHTML]="blog.content"></div>
    </div>
  </div>
} @else {
  <div class="blog-loading">
    <nz-spin nzSize="large"></nz-spin>
  </div>
}

<app-join-part></app-join-part>
<app-footer></app-footer>
