<app-header></app-header>

<div class="user-page">
  <div class="profile-card">
    <div class="avatar">{{ initials }}</div>

    <div class="user-info">
      <h2 class="username">{{ profile?.fullName || profile?.email }}</h2>
      <p class="email">{{ profile?.email }}</p>
      <p class="role">Ուսանող</p>
      @if (profile?.createdAt) {
        <p class="joined">Անդամ է {{ profile!.createdAt | date:'dd.MM.yyyy' }}-ից</p>
      }
    </div>

    <div class="actions">
      <button class="btn-courses" (click)="goToCourses()">
        Դիտել դասընթացները
      </button>
      <button class="btn-logout" (click)="logout()">
        Ելք
      </button>
    </div>
  </div>
</div>

<app-footer></app-footer>
