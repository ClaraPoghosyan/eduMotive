<div class="page-header">
  <h2 class="page-title">Blogs Management</h2>
  <button nz-button nzType="primary" (click)="openAddModal()">
    <span nz-icon nzType="plus"></span>
    Add Blog
  </button>
</div>

<nz-table
  #table
  [nzData]="blogs"
  [nzLoading]="loading"
  nzTableLayout="fixed"
  [nzPageSize]="10"
  nzBordered
  nzNoResult="No blogs found"
>
  <thead>
    <tr>
      <th nzWidth="60px">ID</th>
      <th>Title</th>
      <th>Image URL</th>
      <th nzWidth="130px">Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (blog of table.data; track blog.id) {
      <tr>
        <td>{{ blog.id }}</td>
        <td>{{ blog.title }}</td>
        <td class="image-url">{{ blog.imageUrl }}</td>
        <td>
          <button nz-button nzType="default" nzSize="small" (click)="openEditModal(blog)" class="action-btn">
            <span nz-icon nzType="edit"></span>
          </button>
          <button
            nz-button nzType="default" nzDanger nzSize="small"
            nz-popconfirm
            nzPopconfirmTitle="Delete this blog?"
            (nzOnConfirm)="deleteBlog(blog.id)"
          >
            <span nz-icon nzType="delete"></span>
          </button>
        </td>
      </tr>
    }
  </tbody>
</nz-table>

<nz-modal
  [(nzVisible)]="modalVisible"
  [nzTitle]="editingId ? 'Edit Blog' : 'Add Blog'"
  [nzOkLoading]="modalLoading"
  nzOkText="Save"
  nzCancelText="Cancel"
  (nzOnOk)="handleModalOk()"
  (nzOnCancel)="handleModalCancel()"
  nzWidth="600px"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="form" nzLayout="vertical">
      <nz-form-item>
        <nz-form-label nzRequired>Title</nz-form-label>
        <nz-form-control nzErrorTip="Required">
          <input nz-input formControlName="title" placeholder="Blog title" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Content</nz-form-label>
        <nz-form-control nzErrorTip="Required">
          <textarea
            nz-input
            formControlName="content"
            [nzAutosize]="{ minRows: 4, maxRows: 10 }"
            placeholder="Blog content..."
          ></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Image URL</nz-form-label>
        <nz-form-control nzErrorTip="Required">
          <input nz-input formControlName="imageUrl" placeholder="https://..." />
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
